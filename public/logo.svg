<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark Luxurious Background Gradient -->
    <radialGradient id="darkBg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#24190c" />
      <stop offset="60%" stop-color="#140d06" />
      <stop offset="100%" stop-color="#070402" />
    </radialGradient>

    <!-- Premium Metallic Gold Gradients for Chrome and Shine -->
    <linearGradient id="goldGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9a7322" />
      <stop offset="15%" stop-color="#d8b257" />
      <stop offset="35%" stop-color="#fef3cd" />
      <stop offset="55%" stop-color="#e5c064" />
      <stop offset="75%" stop-color="#b48c35" />
      <stop offset="90%" stop-color="#fcf1cb" />
      <stop offset="100%" stop-color="#8a6116" />
    </linearGradient>

    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86601b" />
      <stop offset="30%" stop-color="#e2bf65" />
      <stop offset="50%" stop-color="#fdf1c9" />
      <stop offset="70%" stop-color="#caa54a" />
      <stop offset="100%" stop-color="#69480d" />
    </linearGradient>

    <!-- Soft Glow Filter for Magical Sparkles -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Montserrat:wght@400;600&amp;display=swap');
      .cursive-text {
        font-family: 'Great Vibes', cursive;
        font-size: 50px;
        fill: url(#goldGradient);
        text-anchor: middle;
        filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.9));
      }
      .sparkle {
        fill: url(#goldGradient);
        filter: url(#goldGlow);
      }
    </style>
  </defs>

  <!-- Outer Circle Clipping and Container -->
  <g id="main-logo-container">
    <!-- Rich Dark Sphere Background -->
    <circle cx="256" cy="256" r="240" fill="url(#darkBg)" />

    <!-- Highly Detailed Sparkling Gold Dust / Particle Layers -->
    <!-- Floating Gold Particles Background -->
    <g opacity="0.4">
      <circle cx="90" cy="180" r="2" fill="#ffe9ac" opacity="0.6" />
      <circle cx="120" cy="110" r="3" fill="#ffe9ac" opacity="0.8" />
      <circle cx="150" cy="80" r="1.5" fill="#fdf1c9" />
      <circle cx="360" cy="90" r="2.5" fill="#e2bf65" />
      <circle cx="410" cy="140" r="1.5" fill="#fdf1c9" />
      <circle cx="430" cy="220" r="3" fill="#ffe9ac" opacity="0.7" />
      <circle cx="380" cy="280" r="2" fill="#caa54a" />
      <circle cx="120" cy="320" r="2.5" fill="#e2bf65" />
      <circle cx="80" cy="250" r="1.5" fill="#ffe9ac" />
      <circle cx="160" cy="380" r="2" fill="#fdf1c9" opacity="0.5" />
      <circle cx="340" cy="380" r="3" fill="#ffe9ac" opacity="0.6" />
    </g>

    <!-- Star Sparkle 4-point Stars Overlay -->
    <path class="sparkle" d="M 110,130 L 112,135 L 117,136 L 112,137 L 110,142 L 108,137 L 103,136 L 108,135 Z" opacity="0.8" />
    <path class="sparkle" d="M 400,105 L 401.5,109 L 405,110 L 401.5,111 L 400,115 L 398.5,111 L 395,110 L 398.5,109 Z" opacity="0.7" />
    <path class="sparkle" d="M 370,200 L 371.5,204 L 375,205 L 371.5,206 L 370,210 L 368.5,206 L 365,205 L 368.5,204 Z" opacity="0.6" />
    <path class="sparkle" d="M 140,290 L 142,295 L 147,296 L 142,297 L 140,302 L 138,297 L 133,296 L 138,295 Z" opacity="0.7" />
    <path class="sparkle" d="M 280,60 L 281.5,64 L 285,65 L 281.5,66 L 280,70 L 278.5,66 L 275,65 L 278.5,64 Z" opacity="0.9" />

    <!-- Ornate Golden Sparkle Borders (Double-Ring Style) -->
    <!-- Outer thick metallic ring -->
    <circle cx="256" cy="256" r="236" fill="none" stroke="url(#goldGradient)" stroke-width="5" />
    <!-- Inner dotted elegant ring -->
    <circle cx="256" cy="256" r="227" fill="none" stroke="url(#goldSoft)" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.8" />

    <!-- Bottom Sparkle Garland Ring Arc -->
    <path d="M 60,256 A 196,196 0 0,0 452,256" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.3" stroke-dasharray="1 5" />

    <!-- The Elegant Lady Portrait Outline (Facing Right) -->
    <g transform="translate(10, -5)">
      
      <!-- Back hair sweeps and negative contours (smooth curves) -->
      <path d="M 225,125 
               C 210,115 190,123 183,138 
               C 175,155 188,175 183,192 
               C 178,208 165,215 174,228 
               C 178,235 186,230 191,235 
               C 195,241 191,249 200,255 
               C 208,262 221,258 225,250" 
            fill="none" stroke="url(#goldGradient)" stroke-width="4.5" stroke-linecap="round" filter="url(#goldGlow)" />

      <!-- Hair Details & Fine Strands -->
      <path d="M 190,140 C 160,132 145,158 140,185 C 135,212 148,238 153,255 C 158,272 170,285 190,294 C 208,302 230,298 235,285" 
            fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.6" stroke-linecap="round" />
            
      <!-- Beautiful hair swerves feeding into the main gold outline -->
      <path d="M 175,155 C 190,152 210,150 220,138" fill="none" stroke="url(#goldSoft)" stroke-width="2.2" opacity="0.8" />
      <path d="M 162,195 C 180,198 202,190 212,180" fill="none" stroke="url(#goldSoft)" stroke-width="1.8" opacity="0.8" />
      <path d="M 152,230 C 172,234 195,225 208,215" fill="none" stroke="url(#goldSoft)" stroke-width="1.5" opacity="0.7" />

      <!-- Highly Polished Delicate Face Profile Silhouette -->
      <!-- Hair forehead swoop, nose, lips, jaw, and neck -->
      <path d="M 225,125 
               C 234,129 242,136 247,144 
               C 252,152 246,163 251,171 
               C 253,174 261,177 264,180 
               C 267,183 267,187 262,189 
               C 256,191 253,191 255,196 
               C 257,200 264,200 260,205 
               C 257,208 251,207 248,211 
               C 244,218 247,226 246,232 
               C 244,240 236,246 231,257
               C 228,265 235,271 238,278" 
            fill="none" stroke="url(#goldGradient)" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round" filter="url(#goldGlow)" />

      <!-- Inner Head Fill for a gorgeous high-end shining profile effect -->
      <!-- We use a subtle transparent-gold fill to prevent it from looking empty -->
      <path d="M 225,125 
               C 234,129 242,136 247,144 
               C 252,152 246,163 251,171 
               C 253,174 261,177 264,180 
               C 267,183 267,187 262,189 
               C 256,191 253,191 255,196 
               C 257,200 264,200 260,205 
               C 257,208 251,207 248,211 
               C 244,218 247,226 246,232 
               C 244,240 236,246 231,257
               C 228,265 235,271 238,278
               L 225,250 
               C 221,258 208,262 200,255
               C 191,249 195,241 191,235
               C 186,230 178,235 174,228
               C 165,215 178,208 183,192
               C 188,175 175,155 183,138
               C 190,123 210,115 225,125 Z" 
            fill="url(#goldSoft)" opacity="0.12" />

      <!-- Elegant Layered 3D Golden Hair Flower near the Ear -->
      <g transform="translate(182, 185) scale(0.9)">
        <!-- Outer petals back shadows/gold -->
        <!-- Center core border -->
        <circle cx="0" cy="0" r="10" fill="url(#goldGradient)" stroke="#52390a" stroke-width="1.5" />
        <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.7" />

        <!-- 5 Beautiful Petals with rich vector shading -->
        <!-- Top Left Petal -->
        <path d="M 0,0 C -18,-28 -44,-22 -38,6 C -32,24 -12,14 0,0" fill="url(#goldSoft)" stroke="url(#goldGradient)" stroke-width="1.8" />
        <!-- Top Right Petal -->
        <path d="M 0,0 C 28,-28 48,-16 38,12 C 30,29 12,17 0,0" fill="url(#goldSoft)" stroke="url(#goldGradient)" stroke-width="1.8" />
        <!-- Bottom Right Petal -->
        <path d="M 0,0 C 38,6 32,38 18,38 C 0,38 -6,17 0,0" fill="url(#goldSoft)" stroke="url(#goldGradient)" stroke-width="1.8" />
        <!-- Bottom Left Petal -->
        <path d="M 0,0 C -28,22 -18,48 -6,44 C 5,39 -2,17 0,0" fill="url(#goldSoft)" stroke="url(#goldGradient)" stroke-width="1.8" />
        <!-- Left Petal -->
        <path d="M 0,0 C -38,-6 -48,22 -28,28 C -12,30 -6,14 0,0" fill="url(#goldSoft)" stroke="url(#goldGradient)" stroke-width="1.8" />

        <!-- Flower Petal Ribs and inner detail lines -->
        <path d="M -6,-6 Q -22,-14 -22,2" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.8" />
        <path d="M 6,-6 Q 22,-14 22,4" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.8" />
        <path d="M 6,6 Q 18,22 12,24" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.8" />
        <path d="M -6,6 Q -18,22 -6,28" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.8" />
      </g>

      <!-- Flying Elegant Golden Butterfly above Head -->
      <g transform="translate(186, 92) rotate(-10) scale(0.8)">
        <!-- Wings Detailed Outline with gradient fill -->
        <path d="M 0,0 C -16,-22 -38,-17 -32,12 C -27,33 -6,17 0,0" fill="url(#goldGradient)" stroke="#4d3600" stroke-width="1" />
        <path d="M 0,0 C -13,13 -24,11 -20,24 C -16,37 -6,20 0,0" fill="url(#goldSoft)" opacity="0.9" />
        <path d="M 0,0 C 16,-27 44,-22 38,6 C 33,27 6,17 0,0" fill="url(#goldGradient)" stroke="#4d3600" stroke-width="1" />
        <path d="M 0,0 C 13,16 24,13 20,27 C 16,39 6,20 0,0" fill="url(#goldSoft)" opacity="0.9" />
        
        <!-- Butterfly Body and antenna details -->
        <ellipse cx="0" cy="4" rx="2" ry="13" fill="#3b2700" />
        <path d="M -1,-7 Q -10,-17 -18,-13" fill="none" stroke="#3b2700" stroke-width="1.5" stroke-linecap="round" />
        <path d="M 1,-7 Q 10,-17 18,-13" fill="none" stroke="#3b2700" stroke-width="1.5" stroke-linecap="round" />
        
        <!-- Sparkle in the wings -->
        <circle cx="20" cy="-2" r="1.5" fill="#fff" opacity="0.8" />
        <circle cx="-16" cy="2" r="1" fill="#fff" opacity="0.8" />
      </g>
      
      <!-- Tiny Sparkle Dots coming off the Butterfly and Hair -->
      <circle cx="160" cy="78" r="1" fill="#fff" opacity="0.8" />
      <circle cx="145" cy="95" r="1.5" fill="#ffe9ac" opacity="0.9" />
      <circle cx="230" cy="80" r="1" fill="#fff" opacity="0.9" />

    </g>

    <!-- Glowing magical sparkle diamonds near the forehead & face -->
    <path class="sparkle" d="M 295,115 L 297.5,120 L 302.5,121.2 L 297.5,122.5 L 295,127.5 L 292.5,122.5 L 287.5,121.2 L 292.5,120 Z" />
    <path class="sparkle" d="M 292,235 L 293.5,238 L 296.5,239 L 293.5,240 L 292,243 L 290.5,240 L 287.5,239 L 290.5,238 Z" opacity="0.8" />

    <!-- The Elegant Brand Name: "Sejal Makeover" Cursive Text -->
    <text x="256" y="375" class="cursive-text">Sejal Makeover</text>

    <!-- Elegant Serif Subtitle below: "LUXURY BEAUTY STUDIO" -->
    <text x="256" y="412" 
          font-family="'Montserrat', sans-serif" 
          font-size="10.5" 
          fill="#d8b257" 
          letter-spacing="9" 
          text-anchor="middle" 
          font-weight="600" 
          opacity="0.9"
          filter="drop-shadow(0px 1.5px 2px rgba(0,0,0,0.9))">LUXURY STUDIO</text>
  </g>
</svg>
